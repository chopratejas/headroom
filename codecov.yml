codecov:
  require_ci_to_pass: true

coverage:
  status:
    # Gate on the comprehensive unit suite (`python` flag from ci.yml's 4 test
    # shards), NOT the narrow native-e2e smoke flags (install-native /
    # wrap-native). Those e2e jobs upload first and barely exercise new code,
    # so an unscoped status computes patch at ~6% off the e2e flags alone and
    # flaps to FAILURE before the unit shards report. Scoping to `python` makes
    # the status reflect real coverage of the diff.
    project:
      default:
        target: auto
        flags:
          - python
    patch:
      default:
        target: auto
        flags:
          - python
      # The new Rust stats *logic* (the observability modules) must be fully
      # covered. Scoped to those modules: thin handler wiring (one-line recorder
      # calls that mirror the integration-tested Anthropic path) is exercised by
      # tests but not held to a strict 100% patch, since covering every backend's
      # glue needs full SigV4/ADC handler mocking for marginal value. Project
      # coverage (below) still tracks the rest.
      rust:
        target: 100%
        flags:
          - rust

flags:
  python:
    carryforward: false
  rust:
    carryforward: false
    paths:
      - "crates/headroom-proxy/src/observability/"

ignore:
  - "tests/**"
  - "scripts/tests/**"
  - ".github/**"
  - ".claude-plugin/**"
  - "headroom/dashboard/templates/**"
  - "plugins/headroom-agent-hooks/.claude-plugin/**"
  - "plugins/headroom-agent-hooks/.github/**"
